<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proiect TSL - Comis Voiajorul</title>
    <link rel="stylesheet" href="TSL.css">
</head>
<body>
    <div class="header-section">
        <h1>Proiect Tehnici de Programare</h1>
        <p id="p1">Comis voiajorul in 4 tehnici diferite de programare<br>
            <p id="autori">Creat de: <br>
                Tontu Federico, <br>
                Tempean David,<br>
                 Deac Stefania, <br>
                 Nour Constantin</p>
        </p>
        <button id="buton">Alege tehnica</button>
        
        <div class="select" id="select">
            <p>Backtracking</p>
            <p>Greedy</p>
            <p>Dinamic</p>
            <p>Branch and Bound</p>
        </div>
    </div>

    <div class="results-box">
        <h2 id="afisare">Tehnica neselectata</h2>
        <hr class="separator">
        <div class="stats">
            <p id="Nr_de_orase">Nr. de orase: <span id="nr_orase">0</span></p>
        </div>
    </div>

    <div class="container">
        <div class="map" id="map">
            <canvas id="tspCanvas"></canvas>
        </div>
        
        <div class="details">
            <div class="selection">
                <div class="speed-control">
                    <label for="viteza">Viteza Redare:</label>
                    <input type="range" id="viteza" min="1" max="100" value="50">
                    <span id="valoare-viteza">50%</span>
                </div>
                <div class="actions">
                    <button id="start">START</button>
                    <button id="resetare">RESETARE</button>
                </div>
            </div>
            <div class="consola_afisare">
                </div>
        </div>
    </div>

    <script src="TSL.js"></script>
</body>
</html>
